name: Continuous Deployment

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  deploy:
    name: Build, Test & Publish
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Extract version from tag
        id: version
        run: |
          $tagName = "$env:GITHUB_REF" -replace '^refs/tags/v', ''
          echo "VERSION=$tagName" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $tagName"

      - name: Restore dependencies
        run: dotnet restore BB84.SAU.slnx

      - name: Build solution
        run: >
          dotnet build BB84.SAU.slnx
          --configuration Release
          --no-restore
          -p:VersionPrefix=${{ steps.version.outputs.VERSION }}
          -p:VersionSuffix=
          -p:FileVersion=${{ steps.version.outputs.VERSION }}
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Run tests
        run: dotnet test BB84.SAU.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Publish application
        run: >
          dotnet publish src/BB84.SAU/BB84.SAU.csproj
          --configuration Release
          --runtime win-x64
          --output ./publish
          -p:VersionPrefix=${{ steps.version.outputs.VERSION }}
          -p:VersionSuffix=
          -p:FileVersion=${{ steps.version.outputs.VERSION }}

      - name: Archive published output
        run: |
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null
          Compress-Archive -Path ./publish/* -DestinationPath ./artifacts/BB84.SAU.win-x64.${{ steps.version.outputs.VERSION }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: BB84.SAU
          path: ./artifacts/BB84.SAU.win-x64.${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: ./artifacts/BB84.SAU.win-x64.${{ steps.version.outputs.VERSION }}.zip
